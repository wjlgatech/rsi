name: ci

# The finish line, enforced. Every push/PR must pass `make check` — which now includes
# the README drift gate (the committed README must equal what data/*.yml generates), so
# the "living knowledge graph" claim can't rot. Then lychee confirms links resolve.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet pyyaml
      - name: make check (validate + tests + README drift gate + graph)
        run: make check

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          # Check the GENERATED README only — the data/prose/*.md fragments carry
          # root-relative links that only resolve in the assembled README.
          args: --config lychee.toml --no-progress README.md
          fail: true
