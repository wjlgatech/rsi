name: knowledge

# The repo is LIVING and SPEC-AS-DATA: contributors edit data/*.yml (or data/prose/*.md),
# and this recompiles the README, the knowledge graph, and the interactive map from them.
# `data → build_readme → README → awesome_kg → graph`. Never hand-edit README.md (drift-gated).

on:
  push:
    paths:
      - "data/**"
      - "knowledge/enrichments.json"
      - "knowledge/certifications.json"
      - "scripts/build_readme.py"
      - "scripts/awesome_kg.py"
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Regenerate README + knowledge graph + interactive map from data/
        run: make build

      - name: Verify the generated README is in sync (drift gate)
        run: python3 scripts/build_readme.py --check

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md knowledge/graph.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: regenerate README + graph from data/*.yml [skip ci]"
          git push
