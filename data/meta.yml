  🔁 **Part of a build-in-public flywheel** →
  **[FM-os](https://github.com/wjlgatech/FM-os)** (the spec-as-data method this repo runs on)
  · **[longevity-loop](https://github.com/wjlgatech/longevity-loop)** (the same method, applied to aging science).

